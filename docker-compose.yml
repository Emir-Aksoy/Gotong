# Quickest path to a running Gotong host:
#
#   docker compose up         # foreground, Ctrl-C stops
#   docker compose up -d      # detached
#   cat data/runtime/admin-link.txt   # first login: one-shot admin URL
#       └─ the setup wizard can't surface through Docker's port forward
#          (requests arrive from the bridge gateway, not loopback, and the
#          wizard trusts loopback only), and logs mask the token — this
#          0600 file on the bind mount is the designed way in.
#
# The `./data` directory on the host is bind-mounted into the container as
# /data and holds the workspace (transcript.jsonl, agents.json,
# secrets.enc.json, etc). Back THAT up; everything else is rebuildable.
#
# For a production deployment behind a TLS-terminating reverse proxy:
#   - set GOTONG_COOKIE_SECURE=1
#   - set GOTONG_ALLOWED_HOSTS=hub.example.com,hub-ws.example.com
#   - drop GOTONG_ALLOW_INSECURE (it is only for loopback-published dev)
#   - see docker-compose.prod.yml / docs/DEPLOY.md for the full
#     Caddy + systemd pattern

services:
  gotong:
    build:
      context: .
      dockerfile: Dockerfile
    image: gotong/host:local
    container_name: gotong-host
    restart: unless-stopped

    # Web (browser) + WebSocket (remote agents). Published to loopback
    # only, so nothing outside this machine can reach the hub (the
    # first-run wizard window included). For LAN access change to
    # "3000:3000" — and understand GOTONG_ALLOW_INSECURE below then
    # applies to your whole LAN, not just this machine.
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:4000:4000"

    volumes:
      - ./data:/data

    environment:
      # Use these defaults for local / LAN dev. See docs/DEPLOY.md for
      # production overrides.
      GOTONG_SPACE: /data
      GOTONG_HOST: 0.0.0.0
      GOTONG_WEB_PORT: "3000"
      GOTONG_WS_PORT: "4000"
      GOTONG_GATING: admin-approval
      GOTONG_COOKIE_SECURE: "0"

      # Inside a container the host must bind 0.0.0.0 for published ports
      # to work, which trips the network-exposed fail-closed gate (no
      # GOTONG_ALLOWED_HOSTS, no Secure cookie → FATAL). Downgrade it to a
      # warning here: the loopback-only `ports:` above is what actually
      # keeps this hub private. Production: use docker-compose.prod.yml,
      # which satisfies the gate properly instead of waiving it.
      GOTONG_ALLOW_INSECURE: "1"

      # Optional — uncomment to give managed agents a default LLM key.
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # Optional — for KMS-mounted master key setups. Skip and the host
      # will use ./data/runtime/secret.key (chmod 600).
      # GOTONG_SECRET_KEY: ${GOTONG_SECRET_KEY:-}

    # Healthcheck is also declared inside the image; this re-states it
    # so `docker compose ps` shows the status column quickly.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:'+process.env.GOTONG_WEB_PORT+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
