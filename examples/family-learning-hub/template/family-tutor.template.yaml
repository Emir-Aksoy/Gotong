# 家长给孩子开 AI 订阅的家庭学习 hub — 家长 hub 一侧的可载入模板 (gotong.template/v1)
#
# 这是第二个**跨组织 (cross-org)** 模板 (第一个是 tea-supply-link)。它和 tea-supply-link
# 的方向**刻意相反**:
#   - tea-supply-link 的模板是**发起方** (奶茶店) 一侧 —— 它起草订单、跨组织派给供货商;
#   - 这个模板是**服务方** (家长) 一侧 —— 因为这套设置的价值 (AI 订阅、导师、主题白名单、
#     家长审批) **全在家长这边**。家长买了订阅、把它配成给孩子用的 AI 导师。
#
# ★ 模版和框架是分离关系 (本案例的教学点,同 tea-supply-link) ★
#   这个文件**只**带「家长 hub 一侧的导师 + 工作流骨架」:
#     - 1 个 /teach 风格的导师 agent (上课 + 内容自评打标);
#     - 1 条声明式工作流 tutor-teach (主题筛查 → 白名单外家长审批 → 上课 → 内容规则审核 →
#       命中则家长审内容);
#     - 1 个指向「学习档案」的 KB 槽位;
#     - 一次性 DeepSeek key 提示。
#   它**不**带、也**不能**带「跨组织的链接」本身:
#     - 哪个 peer 是孩子的 hub、出站放行哪些 capability、是否需要家长审批 —— 这些是
#       **运行时的 peer 配置** (host 的 installPeerLink / admin「联邦」tab),不在模板里,
#       也不在工作流 YAML 里。工作流的 trigger 只写一个 capability 名 (`tutor.teach`),
#       由孩子 hub 跨组织调用时路由过来,**模板从不点名某个 peer**。
#   换句话说:模板是「可搬走的骨架」,链接是「落地时各自配的运行时契约」。
#
# ★ 两道闸是确定性参与者,不是这个 LLM 导师 (本案例最关键的安全约束) ★
#   工作流点名两个 capability —— `topic.screen` (主题白名单) 和 `content.moderate` (内容
#   规则引擎) —— 但它们**故意不在这个模板的 agent 里**。它们由**运行时的确定性参与者**服务
#   (见 examples/family-learning-hub/src/participants.ts),返回**真布尔**结构化输出:
#     - topic.screen   → { allowed, reason }
#     - content.moderate → { flagged, reasons }
#   为什么必须确定性:`guardian-approval.when = "$screen.output.allowed == false"` 这个闸要
#   读 `allowed` 字段。要是把 topic.screen 交给这个 LLM 导师,它返回自由文本没有 `allowed`,
#   求值成 undefined,`undefined == false` 是 false,审批步被**静默跳过** → 白名单外主题零
#   审批直达导师 = fail-OPEN 安全洞。确定性查表返真布尔才读得到,还杜绝被 prompt 注入成
#   `allowed:true`。所以模板只装唯一一个 LLM agent (导师, teach.lesson),两道闸是框架运行时
#   接的确定性参与者。(可跑 demo examples/family-learning-hub/src/index.ts 把这两道闸 +
#   两步恢复都接成可见的真栈。)
#
# ★ 分层内容审核 (纵深防御, 两层都保留, 第二层可选) ★
#   - 底层 (始终在) = 导师**自评打标** `teach.output.flagged` (决策 1.a, 最弱一档)。
#   - 第二层 (可选) = `content.moderate` 确定性**规则引擎**按家长配置的禁词/分类规则预筛课程
#     内容; 空规则清单 = 永不 flag = 关闭 (opt-out), 填规则 = 开启。
#   两层喂同一个 `mod-approval` 闸 (`when: 自评 OR 规则 任一 flagged`) —— 关掉规则引擎只剩
#   自评层照常兜底。
#
# ★ 为什么白名单审批这个 human: 步住在家长 hub 一侧 (本设计另一个关键正确性约束) ★
#   审批人 = 家长,而本地 `human:` 步**只能指派给本 hub 的用户**。家长是家长 hub 的本地
#   用户,孩子 hub 那边指派不到家长。所以「主题白名单审批 + 内容审核审批」必须是**家长 hub 的
#   工作流步骤** (本模板的 tutor-teach),而不是孩子 hub 工作流里的步。孩子 hub 那条工作流
#   (见 examples/family-learning-hub/workflows/child-guided-lesson.yaml) 只管发起 + 记录 +
#   fork,本地不放审批步。
#
# 知识**内容**不在这个文件里 (Stream B 决策 #4):模板只带「MCP 接线 + presetData 指针」。
# 学习档案由你自己的 Obsidian vault 提供 (demo 用确定性 stand-in 替代真 LLM)。
# 学习档案的**主副本**住在孩子 hub (决策 6);家长这边的 learning_records KB 是导师的「教学
# 日志 / fork 来的小结副本」—— 两份并存,家长看得到孩子学了什么 (oversight)。
#
# 导入:admin UI →「Agents / 工作流」→ 导入,或
#   curl -X POST -H "Authorization: Bearer <admin-token>" \
#     -H 'content-type: application/json' \
#     -d "$(jq -Rs '{template: .}' examples/family-learning-hub/template/family-tutor.template.yaml)" \
#     http://127.0.0.1:8745/api/admin/templates/import
schema: gotong.template/v1
template:
  name: 家长 AI 导师(家庭学习 hub · 家长侧)
  description: |-
    家长给孩子开 AI 订阅的家庭学习 hub —— 家长 hub 一侧。一个 /teach 风格的 AI 导师:
    孩子从自己的 hub 跨组织来求学 → 确定性主题白名单筛查 → 白名单外的主题挂起等家长在收件箱
    批准 → 批了 (或本就在白名单内) 就按孩子的学习档案续上这一课,并对敏感内容自评打标 →
    确定性规则引擎复筛课程内容 → 自评或规则任一命中则再挂起等家长审内容。模板带 1 个导师
    agent、1 条带分层审核 + 家长审批的工作流、一个指向学习档案的 KB 槽位,以及一次性 DeepSeek
    key 提示。两道闸 (主题白名单 / 内容规则引擎) 是**运行时的确定性参与者**,不在模板里;跨组织
    的链接 (哪个 peer 是孩子 hub / 出站放行 / 数据类契约) 也是**运行时**配的 —— 导入后到 admin
    「联邦」tab 连上孩子的 hub 即可落地。

  version: 1

  # ── 1 个 agent:/teach 风格的 AI 导师 ──────────────────────────────────────────
  # 只服务**一个** capability: teach.lesson (上课 —— 读学习档案续上 + 对敏感内容自评打标)。
  # 工作流里的另外两个 capability (topic.screen / content.moderate) **不**是这个 agent 的活,
  # 它们是运行时的确定性参与者 (见文件头「两道闸是确定性参与者」)。
  # 挂学习档案 (mcp-obsidian):host spawn 时拉起 mcp-obsidian 子进程,把工具
  # (obsidian__search / get_file_contents) 暴露给该 agent 的 tool-use 循环。
  #
  # ★ 这是一个**忠实复刻 Matt Pocock /teach** 的导师 (github.com/mattpocock/skills) ★
  #   system prompt 把整套方法论写死: 使命锚定 (第一课先立「为什么学」) → 最近发展区 (一小步) →
  #   先知识 (一个要点, 难度是敌人) 后技能 (回忆练习, 难度是工具) → 每课引一手来源 → 选项等长的
  #   小测 (长度不泄露答案) → 有理解证据才记一条 ADR 式 learning-record (不是流水账) → 术语表。
  #   导师输出**结构化 JSON** (下方输出契约), 工作流的内容审核闸 + records.append 直接读这些字段;
  #   example 的真实模式 (src/real-agents.ts FamilyTutorAgent) 把这份 JSON 解析成结构化 Lesson,
  #   src/teach-workspace.ts 再把它落成文件优先工作区 (learning-records/<learnerId>/ 下的
  #   MISSION.md / RESOURCES.md / GLOSSARY.md / lessons/NNNN-slug.md / records/NNNN-slug.md)。
  #   忠实度天花板 (设计 §九): 复刻方法论 + 文件产物即止 —— HTML / 音频 / 浏览器渲染留给消费端 app。
  agents:
    - id: family-tutor
      displayName: AI 导师
      capabilities: [teach.lesson]
      kind: llm
      provider: openai-compatible
      baseURL: https://api.deepseek.com/v1
      providerLabel: DeepSeek
      model: deepseek-chat
      system: |
        你是一个家庭学习 hub 里的 AI 导师, 面向儿童, 严格按 Matt Pocock 的 /teach 方法论上课
        (file-first、多次会话、调用即触发, 不靠定时心跳)。语气温和、具体、鼓励。

        工具 (via MCP, 命名空间 `obsidian__`, 仅在接了学习档案库时可用):
        - obsidian__search: 全文搜索整个学习档案库
        - obsidian__list_files_in_dir: 浏览某目录下的笔记 (学习者工作区在 learning-records/<learner_id>/)
        - obsidian__get_file_contents: 按路径读一篇笔记

        上课 (capability teach.lesson) —— 每节课你必须:
        1. (有工具时) 先读 learning-records/<learner_id>/: 看 MISSION.md (为什么学) 与已有的
           learning-records/ 笔记 (上到第几课、掌握了什么)、RESOURCES.md、GLOSSARY.md; 没有档案
           就从第 1 课开始。学习档案就是你的「时钟」—— 每次孩子来调用, 你读档案接着教, 不从头重来。
        2. 使命锚定: 若还没有 MISSION (第一课), 先和学习者一起把「为什么学」定下来, 并把
           missionEstablished 设为 true; 之后每节课都要服务这个使命。
        3. 最近发展区 (ZPD): 只在 TA 已掌握的基础上推进一小步, 不贪多 (zpd 一句话说明定位)。
        4. 先知识后技能: concept 只讲清「一个」要点 (难度在知识里是敌人); practice 给一个回忆
           练习 (让 TA 复述/举例, 不是重读 —— 难度在技能里是工具)。
        5. 引用来源: citations 至少一条权威来源, primarySource 推荐一个高可信的深入读物
           (绝不只凭脑子里的印象)。
        6. 小测: quiz 出一道选择题, options 各项长度尽量一致 (长度不能泄露答案), answer 是正确项下标。
        7. 术语表: glossary 收本课引入的关键术语 (可为空数组)。
        8. 学习档案: 当这节课有证据表明 TA 真的懂了, 在 insight 写一条 ADR 式要点 (供下一课接续);
           没有就省略 insight (它不是流水账)。
        9. 内容自评打标 (安全, 决策 1.a —— 最弱一层, 背后还有主题白名单硬边界 + 确定性规则引擎
           第二层 + 全量 transcript 原生落家长 hub 兜底): 若涉及投资/理财/股票/赌/贷款/诱导充值/
           联系陌生人等对儿童敏感的主题, flagged 设为 true 并在 flagReason 一句话说明; 否则
           flagged 为 false。拿不准就标。

        输出契约 (硬性): 只输出一个 JSON 对象, 不要任何解释或代码块外的文字。形如:
        {"lessonNo": 数字, "missionEstablished": false, "missionWhy": "为什么学",
         "zpd": "这一课的定位", "title": "标题", "concept": "一个要点的讲解",
         "citations": [{"title": "来源名", "source": "出处"}], "practice": "回忆练习",
         "quiz": {"question": "题干", "options": ["A","B","C"], "answer": 0},
         "primarySource": "推荐深入读物", "glossary": [{"term": "术语", "definition": "定义"}],
         "insight": {"slug": "dash-case", "title": "掌握了什么", "insight": "ADR 式要点"},
         "body": "可读的整课汇总", "flagged": false, "flagReason": ""}

        你**不**负责主题白名单筛查 (topic.screen) 和内容规则审核 (content.moderate) —— 那两道
        闸是框架运行时的**确定性参与者**做的, 返回真布尔给工作流的审批闸读。你只管: 读档案、
        按 /teach 把课上好、对敏感内容自评打标。

        注意:你是在**家长的 hub** 上跑的 (模型在这里,计家长的订阅)。孩子的学习数据带着
        `child-learning` 数据类标记跨组织进来,过 per-link 闸 —— 这是框架运行时的事。

      mcpServers:
        - name: obsidian
          command: uvx
          args: [mcp-obsidian]
          env:
            OBSIDIAN_API_KEY: ${OBSIDIAN_API_KEY}
            OBSIDIAN_HOST: ${OBSIDIAN_HOST}
            OBSIDIAN_PORT: ${OBSIDIAN_PORT}

  # ── 1 条带分层审核 + 家长审批的声明式工作流 ─────────────────────────────────────
  # 导入时 parseTemplate 把这个内层 block 重新序列化成完整 workflow yaml 交给 workflow
  # runtime 校验 + 注册。trigger 的 `tutor.teach` 是孩子 hub 跨组织调过来的能力 (这条工作流
  # 不点名孩子 peer,运行时由联邦链路解析)。
  #   - `screen` 派 topic.screen        → 运行时确定性参与者 (主题白名单, 返真布尔)
  #   - `guardian-approval` 派 gotong.human/v1 → 家长在 /me 收件箱批白名单外例外
  #   - `teach` 派 teach.lesson          → 本模板的导师 agent (标 child-learning)
  #   - `moderate` 派 content.moderate    → 运行时确定性参与者 (规则引擎, 空规则=关)
  #   - `mod-approval` 派 gotong.human/v1 → 自评或规则任一命中时家长审内容
  #
  # 这条工作流**有** human: 步 —— 跟 tea-supply-link 刻意相反:那边的跨组织审批是运行时出站
  # 审批闸 (对工作流透明,工作流里没有 human: 步);这边的白名单 / 内容审批是**家长 hub 工作流
  # 自己的步**,因为审批人 (家长) 是本 hub 用户,本地 human: 步指派得到。
  workflows:
    - id: tutor-teach
      name: AI 导师上课(主题白名单 + 分层内容审核 + 家长审批)
      description: 孩子跨 hub 求学 → 主题白名单筛查 → 白名单外家长批 → 导师续上这一课 → 内容规则复筛 → 命中则家长审内容。
      governance:
        data_sensitivity: confidential
        required_credentials: [deepseek]
        required_human_roles: [家长 (guardian)]
        external_systems: [孩子 hub (联邦 peer, 发起求学)]
        notes: 白名单外主题需家长在收件箱批准;自评或规则引擎命中的内容再过一道家长审核;孩子的学习数据标 child-learning, 过 per-link 出站闸。
      trigger:
        capability: tutor.teach
        payload_schema:
          - id: topic
            label: 学习主题
            type: text
            required: true
          - id: learner_id
            label: 学习者 id
            type: text
            required: true
          # 审批家长 = 家长 hub 的本地用户 id。孩子 hub 跨组织调用时把它带进来 (落地时配一次,
          # 模版/框架分离)。诚实边界:生产中家长 hub 宜从自己的配置解析审批人,不盲信跨 hub
          # payload —— 模板用 $trigger.payload.guardian_id 是可移植占位 (同 cafe-ops 的 manager_id)。
          - id: guardian_id
            label: 审批家长(本 hub 用户 id)
            type: text
            required: true
      steps:
        - id: screen
          description: 导师按家长发布的主题白名单做确定性筛查 (返回真布尔 allowed, 非 LLM)。
          dispatch:
            strategy: { kind: capability, capabilities: [topic.screen] }
            title: 主题白名单筛查
            payload:
              topic: $trigger.payload.topic
        - id: guardian-approval
          description: 白名单外 → 家长在收件箱批准这次例外 (白名单内 when 旁路, 不挂起)。
          when: "$screen.output.allowed == false"
          human:
            assignee: $trigger.payload.guardian_id
            kind: approval
            prompt: 孩子想学一个白名单外的主题,允许这次用 AI 导师上这一课吗?
            title: 白名单外主题审批
        - id: teach
          description: 导师按孩子的 learning-records 续上这一课(/teach 风格 + 内容自评打标)。
          # 只在 (白名单内) 或 (家长批了白名单外例外) 时上课 —— 家长「拒绝」时这一课不上 (跳过)。
          when: "$screen.output.allowed == true || $guardian-approval.output.approved == true"
          dispatch:
            strategy: { kind: capability, capabilities: [teach.lesson] }
            # 这一课的内容是孩子的学习数据 —— 标 child-learning, 跟跨组织出站闸用同一套数据类。
            dataClasses: [child-learning]
            title: 上课
            payload:
              topic: $trigger.payload.topic
              learner_id: $trigger.payload.learner_id
        - id: moderate
          description: 可选的确定性规则引擎复筛课程内容 (空规则清单 = 关闭, 只剩自评层)。
          when: "$screen.output.allowed == true || $guardian-approval.output.approved == true"
          dispatch:
            strategy: { kind: capability, capabilities: [content.moderate] }
            title: 内容规则筛查
            payload:
              lesson: $teach.output
        - id: mod-approval
          description: 自评 (决策 1.a) 或规则引擎任一命中 → 家长在收件箱审这一课的内容。
          when: "$teach.output.flagged == true || $moderate.output.flagged == true"
          human:
            assignee: $trigger.payload.guardian_id
            kind: approval
            prompt: 这一课的内容被标记为需要留意,允许把它给孩子吗?
            title: 课程内容审核
      output:
        screened: $screen.output
        lesson: $teach.output
        moderated: $moderate.output

  # ── 1 个可寻址知识库槽位:MCP 接线 + 预置数据「指针」(不是内容!)──────────────
  # 槽位 name (`learning_records`) 是 KB 的可寻址身份;背后的 mcpServer name (`obsidian`)
  # 是传输。导入时只「上报」不「自动接线」(决策 #4)—— 由你把自己的学习档案接到这个槽位。
  # 注意:学习档案的**主副本**在孩子 hub;这里的 learning_records 是家长侧导师的教学日志 /
  # fork 来的小结副本 (oversight)。
  knowledgeBases:
    - name: learning_records
      description: 学习档案(每个学习者上到第几课 / 学过什么 / 主题白名单,via mcp-obsidian)。主副本在孩子 hub, 此为家长侧教学日志 / fork 副本。
      mcpServer:
        name: obsidian
        command: uvx
        args: [mcp-obsidian]
        env:
          OBSIDIAN_API_KEY: ${OBSIDIAN_API_KEY}
          OBSIDIAN_HOST: ${OBSIDIAN_HOST}
          OBSIDIAN_PORT: ${OBSIDIAN_PORT}
      presetData:
        kind: url
        ref: https://example.com/family-learning-records-seed.tar.zst
        description: |-
          一份学习档案的种子快照 (空的 learning-records/ 骨架 + 一份示例主题白名单) —— 注意这是
          「指针」,不是内容。两种用法:① 把种子目录直接拷进你的 Obsidian vault;或 ② 打包托管,
          让这个 ref 指过去再显式拉取。框架永不经手学习档案内容。

  # ── 一键:导入时提示填一次 API key,自动应用到导师 agent ──────────────────────
  defaults:
    apiKeyPrompt:
      provider: openai-compatible
      baseURL: https://api.deepseek.com/v1
      label: DeepSeek
