# 贡献档案 — 成员把涂装方案 / 战报交进战团**共享档案库** (surface.me 自助, 无审批)。
# 这是 "共享资源" 那条:任何成员的贡献都进同一个库, 别的成员都能查到 (合作的底座)。
schema: gotong.workflow/v1
workflow:
  id: warband-contribute
  name: 贡献档案 — 涂装方案 / 战报
  description: 成员把一份涂装方案或战报交进战团共享档案库, 供全团查阅。
  governance:
    data_sensitivity: internal
    required_credentials: [deepseek]
    external_systems: [obsidian (战团共享档案库)]
    notes: 成员自助贡献, 无审批; 内容进**全团共享**的同一个档案库, 不涉敏感个人数据。
  trigger:
    capability: warband.contribute
    payload_schema:
      - id: kind
        label: 贡献类型
        type: select
        required: true
        options:
          - { value: paint-scheme, label: 涂装方案 }
          - { value: battle-report, label: 战报 }
      - id: title
        label: 标题
        type: text
        required: true
      - id: body
        label: 正文 (涂装步骤 / 战斗经过)
        type: textarea
        rows: 6
        required: true
  surface:
    me:
      enabled: true
      label: 我要贡献档案
      description: 把你的涂装方案或战报交进战团共享档案库, 全团可查。
      allowed_roles: [owner, admin, member]
      user_scope_field: contributor_id
  steps:
    - id: file
      description: 司库把这份贡献归档进共享档案库。
      dispatch:
        strategy: { kind: capability, capabilities: [warband.file-contribution] }
        title: "归档: $trigger.payload.title"
        payload:
          kind: $trigger.payload.kind
          title: $trigger.payload.title
          body: $trigger.payload.body
          contributor: $trigger.payload.contributor_id
  output:
    kind: $trigger.payload.kind
    title: $trigger.payload.title
    filed: $file.output
