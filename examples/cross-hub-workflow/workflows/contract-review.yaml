schema: gotong.workflow/v1
workflow:
  id: cross-hub-contract-review
  name: cross-org contract review
  # The orchestrating hub (org A) runs this workflow. Its first step dispatches a
  # capability that lives on a PEER hub (org B's outside counsel); the second is a
  # local step that files the peer's verdict. Nothing in the YAML names a peer —
  # `legal.contract-review` is an ordinary capability that just happens to resolve
  # to a peer wrapper. Cross-hub orchestration is capability dispatch where the
  # capability lives on another hub.
  trigger: { capability: legal:start }
  steps:
    - id: review
      dispatch:
        strategy: { kind: capability, capabilities: [legal.contract-review] }
        payload: { doc: $trigger.payload.doc }
    - id: archive
      dispatch:
        strategy: { kind: capability, capabilities: [legal.archive] }
        payload: { doc: $trigger.payload.doc, verdict: $review.output.verdict }
