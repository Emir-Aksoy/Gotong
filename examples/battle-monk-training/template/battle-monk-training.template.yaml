# 战斗修士锻炼 — 可载入模板 (aipehub.template/v1)
#
# battle-monk-training 的「修士团」做成一个**可载入文件**(不是内置 TS):
#   4 个托管 LLM agent  +  1 个可寻址知识库槽位(你的修士档案 Codex / mcp-obsidian)。
#
# 跟 personal-research-hub 模板一样,这四个本来就都是托管 LLM agent,模板把整支队伍
# 一起搬走(Stream B「一个文件装 N agent」)。编排(督修 → 三柱的 dispatch 图)是
# DispatchToolset(Phase 10)代码级接线,模板 schema 不承载 —— 留给 example 代码串
# (workflows: [],同 research-hub / coding-hub 口径)。
#
# 知识(= 修士的**状态档案**)**不在这个文件里**(Stream B 决策 #4):模板只带「MCP
# 接线 + presetData 指针」。Codex 内容是你自己的 Obsidian vault(example 用临时目录里
# 的 codex/ 演示)。
#
# 风格说明:原创同人致敬,grimdark-monastic 美学,不含任何受版权保护的文本或专有名词,
# 与任何版权方无官方关联。
#
# 导入:admin UI →「Agents / 工作流」→ 导入,或
#   curl -X POST -H "Authorization: Bearer <admin-token>" \
#     -H 'content-type: application/json' \
#     -d "$(jq -Rs '{template: .}' examples/battle-monk-training/template/battle-monk-training.template.yaml)" \
#     http://127.0.0.1:8745/api/admin/templates/import
schema: aipehub.template/v1
template:
  name: 战斗修士锻炼(身-心-学三柱)
  description: |-
    一个为冷峻者而设的个人成长 hub:督修(路由)**结合修士今日的处境**(时间 / 精力 /
    伤病 / 专攻),把操练**合适地**派给三柱 —— 肉身 / 心志 / 学识,而不是不顾状态把三柱
    全压上。每柱读取修士档案(Codex)里的前序状态,**按状态调节强度**给出下一阶指令,
    再把新记录写回档案。语气冷峻、不留情面,目标用户为战锤 40k 风格的冷淡型男性。模板带
    4 个托管 agent + 一个指向 Codex 的 KB 槽位接线 + 一份指向种子档案快照的 presetData
    「指针」;状态内容由你自己的 Obsidian vault 提供。

  version: 1

  # ── 4 个 agent:督修(路由)+ 三柱(肉身 / 心志 / 学识)─────────────────────────
  # 四个都挂同一个修士档案(mcp-obsidian)。host spawn 时各自拉起 mcp-obsidian 子进程,
  # 把它的工具(obsidian__search / obsidian__get_file_contents / 写工具)暴露给该 agent
  # 的 tool-use 循环。server 名 = `obsidian` → 工具命名 obsidian__*(与 examples/obsidian-kb
  # 同约定)。
  agents:
    # 督修:路由器 —— 读档案评估,把今日操练派给三柱。dispatch 允许清单(督修 → 三柱)
    # 由 example 代码用 DispatchToolset 接线,不在模板内。
    - id: preceptor
      displayName: 督修
      capabilities: [preceptor, route]
      kind: llm
      provider: openai-compatible
      baseURL: https://api.deepseek.com/v1
      providerLabel: DeepSeek
      model: deepseek-chat
      system: |
        你是战斗修士会的督修。语气冷峻、简短、不留情面,不安慰、不寒暄、不赘言。

        每次接到修士的操练请求,先读两样东西,再决定分派 —— 不要不顾状态把三柱
        全压上:
        1. 读状态:修士今日的处境 —— 可用时间、精力、有无伤病、是否点名专攻某柱。
        2. 读档案:obsidian__search / obsidian__get_file_contents 查 Codex 里三柱
           (肉身 / 心志 / 学识)的前序阶次,确认各柱练到哪、哪柱最落后。
        3. 按状态分派,合适为要:
           · 时间足、精力高 → 三柱全开,满负荷;
           · 时间紧或精力低 → 只取最落后的一柱,轻负荷恢复,不逞强;
           · 有伤病 → 停肉身(body),把操练转给心志 / 学识;
           · 点名专攻 → 那一柱优先,容量不够时挤掉较稳的柱;
           · 其余情况 → 取最落后的两柱。
           分派给三柱的 capability:肉身 body、心志 mind、学识 lore。
        4. 让档案承载记录。每柱完成后会把新记录写回 Codex,你不重复其内容。
        指令以结果为准,不解释、不鼓励。逞强与懈怠同是软弱;按状态行事。
      mcpServers:
        - name: obsidian
          command: uvx
          args: [mcp-obsidian]
          env:
            OBSIDIAN_API_KEY: ${OBSIDIAN_API_KEY}
            OBSIDIAN_HOST: ${OBSIDIAN_HOST}
            OBSIDIAN_PORT: ${OBSIDIAN_PORT}

    # 肉身:体能操练官。
    - id: body-drill
      displayName: 肉身锻造官
      capabilities: [body]
      kind: llm
      provider: openai-compatible
      baseURL: https://api.deepseek.com/v1
      providerLabel: DeepSeek
      model: deepseek-chat
      system: |
        你掌肉身一柱。读修士档案 codex/body.md 的前序记录,给出**下一阶**的体能指令
        (负重 / 耐力 / 力量 / 节制),承前推进、可量化、可执行。**按督修传来的今日状态
        调节强度**:精力高、时间足 → 满负荷推进;精力低或时间紧 → 只下轻负荷恢复指令
        (慢走、舒展、养护),不逼至力竭。把新记录追加写回 codex/body.md(标注阶次与
        强度)。语气冷峻、简短。疼痛是软弱离体的信号,但伤病时养护肉身才是操练。
      mcpServers:
        - name: obsidian
          command: uvx
          args: [mcp-obsidian]
          env:
            OBSIDIAN_API_KEY: ${OBSIDIAN_API_KEY}
            OBSIDIAN_HOST: ${OBSIDIAN_HOST}
            OBSIDIAN_PORT: ${OBSIDIAN_PORT}

    # 心志:精神戒律督导。
    - id: mind-forge
      displayName: 心志督导
      capabilities: [mind]
      kind: llm
      provider: openai-compatible
      baseURL: https://api.deepseek.com/v1
      providerLabel: DeepSeek
      model: deepseek-chat
      system: |
        你掌心志一柱。读修士档案 codex/mind.md 的前序记录,给出**下一阶**的精神戒律
        (专注 / 自省 / 情绪秩序 / 抗动摇),承前推进、可执行。**按督修传来的今日状态
        调节强度**:状态好 → 常规或加重;枯竭时 → 只下静养一刻、观呼吸之类的轻负荷,
        疲时养神亦是操练。把新记录追加写回 codex/mind.md(标注阶次与强度)。语气冷峻、
        简短。秩序是抵御混乱的唯一壁垒。
      mcpServers:
        - name: obsidian
          command: uvx
          args: [mcp-obsidian]
          env:
            OBSIDIAN_API_KEY: ${OBSIDIAN_API_KEY}
            OBSIDIAN_HOST: ${OBSIDIAN_HOST}
            OBSIDIAN_PORT: ${OBSIDIAN_PORT}

    # 学识:典籍研习官。
    - id: lore-scribe
      displayName: 学识研习官
      capabilities: [lore]
      kind: llm
      provider: openai-compatible
      baseURL: https://api.deepseek.com/v1
      providerLabel: DeepSeek
      model: deepseek-chat
      system: |
        你掌学识一柱。读修士档案 codex/lore.md 的前序记录,给出**下一阶**的研习指引
        (一章典籍 / 一条可行法则 / 一次复述检验),承前推进、可执行。**按督修传来的
        今日状态调节强度**:状态好 → 进新章、立新法;枯竭时 → 只温故旧档一篇,不增新负。
        把新记录追加写回 codex/lore.md(标注阶次与强度)。语气冷峻、简短。无知者先死。
      mcpServers:
        - name: obsidian
          command: uvx
          args: [mcp-obsidian]
          env:
            OBSIDIAN_API_KEY: ${OBSIDIAN_API_KEY}
            OBSIDIAN_HOST: ${OBSIDIAN_HOST}
            OBSIDIAN_PORT: ${OBSIDIAN_PORT}

  # ── 1 个可寻址知识库槽位:MCP 接线 + 预置数据「指针」(不是内容!)──────────
  # 槽位 name(`acolyte_codex`)是 KB 的**可寻址身份**(也是 Stream C 联邦 per-link
  # 授权的目标);它背后的 mcpServer name(`obsidian`)是**传输**。导入时只「上报」
  # 不「自动接线」(决策 #4)—— 由你把自己的 Obsidian 档案接到这个槽位。
  knowledgeBases:
    - name: acolyte_codex
      description: 修士档案 Codex(三柱状态:肉身 / 心志 / 学识,via mcp-obsidian)
      mcpServer:
        name: obsidian
        command: uvx
        args: [mcp-obsidian]
        env:
          OBSIDIAN_API_KEY: ${OBSIDIAN_API_KEY}
          OBSIDIAN_HOST: ${OBSIDIAN_HOST}
          OBSIDIAN_PORT: ${OBSIDIAN_PORT}
      presetData:
        kind: url
        ref: https://example.com/battle-monk-codex-seed.tar.zst
        description: |-
          一份种子档案快照(= example 里 codex/ 那套三柱结构的打包)—— 注意这是「指针」,
          不是内容。两种用法:① 把种子档案直接拷进你的 Obsidian vault;或 ② 把它们打包
          托管,让这个 ref 指过去再显式拉取。框架永不经手你的状态内容。

  # ── 一键:导入时提示填一次 API key,自动应用到四个 agent ──────────────────────
  defaults:
    apiKeyPrompt:
      provider: openai-compatible
      baseURL: https://api.deepseek.com/v1
      label: DeepSeek
