# 个人研究中枢 — 可载入模板 (gotong.template/v1)
#
# personal-research-hub 的「研究团队」做成一个**可载入文件**(不是内置 TS):
#   3 个托管 LLM agent  +  1 个可寻址知识库槽位(你的 Obsidian wiki / mcp-obsidian)。
#
# 跟 personal-coding-hub 模板的区别:那边 agents[] 只有 1 个导师(因为 claude-code /
# codex 是 CliParticipant,不能当托管 agent);这里 librarian / compiler / researcher
# **本来就都是托管 LLM agent**,所以模板把整支研究队一起搬走(Stream B「一个文件装
# N agent」)。
#
# 编排(librarian 把活派给 compiler / researcher)**不在模板里**:那是 DispatchToolset
# (Phase 10)代码级接线,模板 schema 不承载 dispatch 图。模板携带的是**团队 + KB 接线**,
# 你用 example 的代码路由(src/index.ts)或一条工作流把它们串起来。
#
# 知识内容**不在这个文件里**(Stream B 决策 #4):模板只带「MCP 接线 + presetData
# 指针」。wiki 内容是你自己的 Obsidian vault(example 用临时目录里的 raw/ + wiki/ 演示)。
#
# 导入:admin UI →「Agents / 工作流」→ 导入,或
#   curl -X POST -H "Authorization: Bearer <admin-token>" \
#     -H 'content-type: application/json' \
#     -d "$(jq -Rs '{template: .}' examples/personal-research-hub/template/personal-research-hub.template.yaml)" \
#     http://127.0.0.1:8745/api/admin/templates/import
schema: gotong.template/v1
template:
  name: 个人研究中枢(Karpathy 知识库循环)
  description: |-
    personal-research-hub 的研究团队:一个 librarian 路由把 raw 源材料(剪藏 / PDF /
    笔记)用 compiler agent 编译成互链 Obsidian wiki(LLM-as-compiler:写摘要、建
    backlink、归类),再用 researcher agent ask-your-wiki(检索笔记 → 综合答案 → 归档
    回去,知识复利)。模板带 3 个托管 agent + 一个指向 wiki 的 KB 槽位接线 + 一份指向
    种子 vault 快照的 presetData「指针」;wiki 内容由你自己的 Obsidian vault 提供。

  version: 1

  # ── 3 个 agent:librarian(路由)/ compiler(编译)/ researcher(检索)──────────
  # 三个都挂同一个知识库(mcp-obsidian)。host spawn 时各自拉起 mcp-obsidian 子进程,
  # 把它的工具(obsidian__search / obsidian__get_file_contents / obsidian__append…)
  # 暴露给该 agent 的 tool-use 循环。server 名 = `obsidian` → 工具命名 obsidian__*
  # (与 examples/obsidian-kb 同约定,便于复用那套 Local REST API 配置)。
  agents:
    # librarian:研究路由器 —— 决定「先 ingest 还是先 retrieve」,把活派给 compiler /
    # researcher。它本身也查 wiki 决定路由。dispatch 允许清单(librarian → compiler /
    # researcher)由 example 代码用 DispatchToolset 接线,不在模板内。
    - id: librarian
      displayName: 研究馆员
      capabilities: [librarian, route]
      kind: llm
      provider: openai-compatible
      baseURL: https://api.deepseek.com/v1
      providerLabel: DeepSeek
      model: deepseek-chat
      system: |
        你是一个个人研究中枢的「馆员」/ 路由器。你不亲自写 wiki 笔记 —— 你判断该
        ingest(把新源材料编译进 wiki)还是 retrieve(从已编译笔记里答问),并把活
        派给合适的 agent。**结合 wiki 的当前状态分派,别盲目重编已有的笔记。**

        先看清情况,再分派:
        1. 先 obsidian__search / 列目录,看 wiki 里**已经编译了哪些源**。
        2. 要入库时 → 只把**还没编译**的源派给编译 agent(capability: compile);
           已在 wiki 里的源不要重编。
        3. 只是来了问题、没要求入库 → **跳过编译**,直接派给检索 agent
           (capability: research)做 ask-your-wiki(库已覆盖就别浪费一次编译)。
        4. 既要入库又要答问 → 先补编缺的源,再检索。
        5. 让 wiki 承载链接 —— 每条笔记 backlink 到 index,答案归档回 wiki/answers/。

        核心原则(来自 Karpathy 方法论):raw 源材料只增不改;LLM 是把 raw 编译成
        互链 markdown 的「编译器」;到规模后让 agent 研究自己的笔记(ask-your-wiki),
        知识复利增长。
      mcpServers:
        - name: obsidian
          command: uvx
          args: [mcp-obsidian]
          env:
            OBSIDIAN_API_KEY: ${OBSIDIAN_API_KEY}
            OBSIDIAN_HOST: ${OBSIDIAN_HOST}
            OBSIDIAN_PORT: ${OBSIDIAN_PORT}

    # compiler:LLM-as-compiler —— 读一篇 raw 源材料,写一条互链 wiki 笔记。
    - id: compiler
      displayName: 编译器
      capabilities: [compile]
      kind: llm
      provider: openai-compatible
      baseURL: https://api.deepseek.com/v1
      providerLabel: DeepSeek
      model: deepseek-chat
      system: |
        你是知识库的「编译器」(Karpathy 的 LLM-as-compiler 模式)。给你一篇 raw 源
        材料的路径,你:
        1. obsidian__get_file_contents 读原文。
        2. 写一条 wiki 笔记:一句话标题、3-5 行摘要、关键概念,并用 [[wikilink]] 建立
           backlink(至少 backlink 到 [[index]],相关概念互链)。
        3. 把笔记写回 vault(obsidian 的写工具),并在 index 追加一行链接。
        只编译,不臆造原文没有的事实;拿不准就标「原文未说明」。
      mcpServers:
        - name: obsidian
          command: uvx
          args: [mcp-obsidian]
          env:
            OBSIDIAN_API_KEY: ${OBSIDIAN_API_KEY}
            OBSIDIAN_HOST: ${OBSIDIAN_HOST}
            OBSIDIAN_PORT: ${OBSIDIAN_PORT}

    # researcher:ask-your-wiki —— 检索已编译笔记,综合答案,归档回去。
    - id: researcher
      displayName: 研究员
      capabilities: [research]
      kind: llm
      provider: openai-compatible
      baseURL: https://api.deepseek.com/v1
      providerLabel: DeepSeek
      model: deepseek-chat
      system: |
        你做「ask-your-wiki」(Karpathy 模式)。给你一个问题,你:
        1. obsidian__search 在已编译 wiki 笔记里检索相关条目,obsidian__get_file_contents
           读全文跟着 [[wikilink]] 扩展。
        2. 综合一个答案,**按笔记标注依据**(如「依据 [[llm-as-compiler]]」)。
        3. 把答案作为一条新笔记归档回 wiki/answers/,引用用到的笔记 —— 知识复利。
        只依据 wiki 里的笔记作答;库里没有就直说,并建议先 ingest 哪些源材料。
      mcpServers:
        - name: obsidian
          command: uvx
          args: [mcp-obsidian]
          env:
            OBSIDIAN_API_KEY: ${OBSIDIAN_API_KEY}
            OBSIDIAN_HOST: ${OBSIDIAN_HOST}
            OBSIDIAN_PORT: ${OBSIDIAN_PORT}

  # ── 1 个可寻址知识库槽位:MCP 接线 + 预置数据「指针」(不是内容!)──────────
  # 槽位 name(`research_wiki`)是 KB 的**可寻址身份**(也是 Stream C 联邦 per-link
  # 授权的目标);它背后的 mcpServer name(`obsidian`)是**传输**。导入时只「上报」
  # 不「自动接线」(决策 #4)—— 由你把自己的 Obsidian wiki 接到这个槽位。
  knowledgeBases:
    - name: research_wiki
      description: 个人研究 wiki(raw 源材料编译成的互链 Obsidian vault via mcp-obsidian)
      mcpServer:
        name: obsidian
        command: uvx
        args: [mcp-obsidian]
        env:
          OBSIDIAN_API_KEY: ${OBSIDIAN_API_KEY}
          OBSIDIAN_HOST: ${OBSIDIAN_HOST}
          OBSIDIAN_PORT: ${OBSIDIAN_PORT}
      presetData:
        kind: url
        ref: https://example.com/karpathy-research-wiki-seed.tar.zst
        description: |-
          一份种子 wiki 快照(= example 里 raw/ + wiki/ 那套结构的打包)—— 注意这是
          「指针」,不是内容。两种用法:① 把种子笔记直接拷进你的 Obsidian vault;或
          ② 把它们打包托管,让这个 ref 指过去再显式拉取。框架永不经手这份知识内容。

  # ── 一键:导入时提示填一次 API key,自动应用到三个 agent ──────────────────────
  defaults:
    apiKeyPrompt:
      provider: openai-compatible
      baseURL: https://api.deepseek.com/v1
      label: DeepSeek
