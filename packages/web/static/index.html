<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AipeHub</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>AipeHub</h1>
      <span class="subtitle">communication space</span>
      <span id="conn" class="conn" data-status="pending">connecting…</span>
    </header>
    <main>
      <section id="participants">
        <h2>Participants</h2>
        <div id="participants-list"></div>
      </section>
      <section id="transcript">
        <h2>Transcript <span id="transcript-count" class="count"></span></h2>
        <ol id="transcript-list"></ol>
      </section>
      <section id="pending">
        <h2>Pending for humans</h2>
        <div id="pending-list"></div>
      </section>
    </main>
    <script src="/app.js" defer></script>
  </body>
</html>
