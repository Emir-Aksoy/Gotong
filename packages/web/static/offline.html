<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1a1a" />
    <title>Gotong — 离线</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #1a1a1a;
        color: #f7f7f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.1rem;
        padding: 2rem 1.5rem;
        box-sizing: border-box;
        text-align: center;
      }
      h1 { font-size: 1.4rem; font-weight: 600; margin: 0; }
      p { margin: 0; color: #b9b9b3; line-height: 1.6; max-width: 24rem; }
      button {
        font: inherit;
        font-weight: 600;
        padding: 0.55rem 1.4rem;
        border: 1px solid #5b9bd5;
        background: #5b9bd5;
        color: #fff;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover { filter: brightness(1.08); }
      .dot { width: 56px; height: 56px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img class="dot" src="/icon.svg" alt="" width="56" height="56" />
      <h1 data-i18n="heading">当前离线</h1>
      <p data-i18n="body">Gotong 的实时数据需要联网。请检查网络连接后重试 —— 你的本地 hub 仍在磁盘上，重连即恢复。</p>
      <button type="button" data-i18n="retry" onclick="location.reload()">重试</button>
    </div>
    <!--
      i18n: this is the PWA offline fallback served by the service worker
      when there is NO network — it must be fully self-contained (no
      app-core.js, no fetch). So the bilingual swap is a tiny inline dict
      applied synchronously. Language comes from the same `lang` cookie the
      main SPA sets → navigator.language → zh. The Chinese above is the
      on-disk default; this script rewrites it per language at load.
    -->
    <script>
      ;(function () {
        function detectLang() {
          try {
            var m = /(?:^|;\s*)lang=([^;]+)/.exec(document.cookie || '')
            if (m) {
              var v = decodeURIComponent(m[1]).toLowerCase()
              if (v === 'en' || v === 'zh') return v
            }
          } catch (e) {}
          try {
            var nav = (navigator.language || '').toLowerCase()
            if (nav && nav.indexOf('zh') !== 0) return 'en'
          } catch (e) {}
          return 'zh'
        }
        var T = {
          zh: {
            docTitle: 'Gotong — 离线',
            heading: '当前离线',
            body: 'Gotong 的实时数据需要联网。请检查网络连接后重试 —— 你的本地 hub 仍在磁盘上，重连即恢复。',
            retry: '重试',
          },
          en: {
            docTitle: 'Gotong — Offline',
            heading: "You're offline",
            body: 'Gotong needs a network connection for live data. Check your connection and retry — your local hub is still on disk and recovers the moment you reconnect.',
            retry: 'Retry',
          },
        }
        var lang = detectLang()
        var t = T[lang] || T.zh
        try {
          document.documentElement.lang = lang
          document.title = t.docTitle
        } catch (e) {}
        var nodes = document.querySelectorAll('[data-i18n]')
        for (var i = 0; i < nodes.length; i++) {
          var k = nodes[i].getAttribute('data-i18n')
          if (t[k] != null) nodes[i].textContent = t[k]
        }
      })()
    </script>
  </body>
</html>
