<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <!--
      AUDIT-P3-05: the invite token lives in the URL path (which goes
      out as Referer to any subresource request). Force `no-referrer`
      on the page so even future additions (web fonts, analytics,
      images) cannot leak the token to a third-party origin. We also
      strip the token from window.location via history.replaceState
      in invite.js immediately after the lookup completes.
    -->
    <meta name="referrer" content="no-referrer" />
    <title>AipeHub · 接受邀请</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      /* Mirrors me.html's inline style — invite is a sibling member-facing
         surface, same single-column layout, same minimal aesthetic. Kept
         inline so it never breaks when admin's CSS evolves. */
      body { font-family: system-ui, sans-serif; max-width: 36rem; margin: 2rem auto; padding: 0 1rem; color: #222; }
      h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
      h2 { font-size: 1.05rem; margin: 1.5rem 0 0.5rem; }
      label { display: block; font-size: 0.85rem; color: #555; margin: 0.5rem 0 0.15rem; }
      input, button { font: inherit; padding: 0.4rem; box-sizing: border-box; width: 100%; }
      button { background: #1f6feb; color: #fff; border: none; cursor: pointer; padding: 0.55rem 0.75rem; }
      button:hover { background: #1759c8; }
      button:disabled { background: #888; cursor: not-allowed; }
      .hidden { display: none !important; }
      .status { font-size: 0.9rem; min-height: 1.2em; margin: 0.5rem 0; }
      .status.error { color: #c0392b; }
      .status.ok { color: #27ae60; }
      .meta { color: #666; font-size: 0.9rem; }
      .invite-info { background: #f6f8fa; border: 1px solid #d0d7de; padding: 0.75rem 1rem; border-radius: 6px; margin: 1rem 0; }
      .invite-info strong { color: #222; }
    </style>
  </head>
  <body>
    <h1>AipeHub · 接受邀请</h1>
    <p class="meta">设置密码后立即激活账号并跳转到你的工作流页面。</p>

    <div id="status" class="status"></div>

    <!-- Shown while we GET /api/invites/:token to learn what's in this link. -->
    <section id="loading-section">
      <p class="meta">正在验证邀请链接…</p>
    </section>

    <!-- Shown when invite is valid + pending. The actual accept form. -->
    <section id="accept-section" class="hidden">
      <div class="invite-info">
        <div>邀请邮箱: <strong id="invite-email"></strong></div>
        <div>分配角色: <strong id="invite-role"></strong></div>
        <div>到期: <span id="invite-expires" class="meta"></span></div>
      </div>
      <form id="accept-form">
        <label>显示名 (可选,会显示在你创建的工作流上)
          <input name="displayName" type="text" autocomplete="name" />
        </label>
        <label>设置密码 (至少 8 个字符)
          <input name="password" type="password" required autocomplete="new-password" minlength="8" />
        </label>
        <label>再次输入密码
          <input name="password2" type="password" required autocomplete="new-password" minlength="8" />
        </label>
        <button type="submit" id="accept-btn" style="margin-top:0.75rem;">激活账号</button>
      </form>
    </section>

    <!-- Shown when invite is unusable (expired / revoked / already used / not found). -->
    <section id="fail-section" class="hidden">
      <h2 id="fail-title">链接不可用</h2>
      <p id="fail-detail" class="meta"></p>
      <p class="meta" style="margin-top:1rem;">请联系给你发邀请的人重新生成一条链接。</p>
    </section>

    <script src="/invite.js"></script>
  </body>
</html>
