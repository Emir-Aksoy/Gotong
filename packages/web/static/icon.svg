<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="AipeHub">
  <!-- Full-bleed background so the icon renders cleanly under a maskable
       safe-zone crop (the hub motif below stays within the centre 80%). -->
  <rect width="512" height="512" fill="#1a1a1a"/>
  <g stroke="#5b9bd5" stroke-width="12" stroke-linecap="round" opacity="0.85">
    <line x1="256" y1="256" x2="256" y2="136"/>
    <line x1="256" y1="256" x2="152" y2="316"/>
    <line x1="256" y1="256" x2="360" y2="316"/>
  </g>
  <g fill="#7fb3e0">
    <circle cx="256" cy="136" r="30"/>
    <circle cx="152" cy="316" r="30"/>
    <circle cx="360" cy="316" r="30"/>
  </g>
  <circle cx="256" cy="256" r="50" fill="#5b9bd5"/>
</svg>
