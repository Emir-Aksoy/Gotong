# Ready-to-run Prometheus config for an AipeHub host (Route B P0-M7).
#
# This is the file the one-click stack (../docker-compose.yml) mounts at
# /etc/prometheus/prometheus.yml. It wires three things an operator otherwise
# has to assemble by hand:
#   - scrape the Hub's /metrics (the non-admin-gated route, P0-M7-M1) with a
#     bearer token — NO machine-admin minting;
#   - load the alert rules in aipehub.alerts.yml;
#   - hand firing alerts to Alertmanager for routing.
#
# For a hand-rolled Prometheus (not the compose stack) the scrape block alone
# is in scrape.example.yml; copy whichever fits.

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s

# Alert rules live in a sibling file so they can be edited / linted alone.
rule_files:
  - /etc/prometheus/aipehub.alerts.yml

# Firing alerts go to Alertmanager (severity-routed — see alertmanager.yml).
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # --------------------------------------------------------------------
  # The AipeHub Hub — the internal /metrics scrape route (P0-M7-M1).
  # --------------------------------------------------------------------
  # /metrics is gated by AIPE_METRICS_TOKEN, NOT the admin session. Put the
  # same token the host was started with in ./secrets/aipehub.token (mounted
  # read-only at the path below). Rotation = swap the file; no Prometheus
  # restart needed. Unset on the host → the route 404s (fail-closed) and this
  # job shows as `up == 0` → AipehubHostDown fires (an honest "not wired yet").
  - job_name: aipehub
    metrics_path: /metrics
    scheme: http # → https when the Hub is fronted by TLS (Caddy/nginx on 443)
    bearer_token_file: /etc/prometheus/aipehub.token
    static_configs:
      - targets:
          # Docker Desktop / Linux (with the compose extra_hosts gateway):
          # reaches a Hub listening on the host's :3000. For a remote Hub use
          # its real host:port and switch scheme to https.
          - host.docker.internal:3000

  # --------------------------------------------------------------------
  # OS-level metrics — disk, memory, process RSS (node_exporter).
  # --------------------------------------------------------------------
  # AipeHub does NOT export these (the binary stays small + focused). The
  # `aipehub-host` alert group keys off this job being named "node". Install
  # node_exporter on the Hub box; on Docker Desktop it's reachable via the
  # host gateway, on Linux compose uses the extra_hosts mapping below.
  - job_name: node
    static_configs:
      - targets:
          - host.docker.internal:9100

  # Prometheus scraping itself — handy for "is the scraper alive" panels.
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
