# Grafana dashboard provisioning — auto-loads the AipeHub overview dashboard
# from /var/lib/grafana/dashboards (the compose stack mounts aipehub-overview.json
# there). No manual "Import → upload JSON" step needed.
apiVersion: 1
providers:
  - name: AipeHub
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
