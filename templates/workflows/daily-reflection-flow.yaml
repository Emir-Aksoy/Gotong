# =============================================================================
# Workflow: 每日反思(member-facing 示例)
# Schema: gotong.workflow/v1
#
# 一个最小的「成员工作台」示例:任何登录用户都能从 /me 直接跑,
# 写下今天的 3 段话,一位反思教练把它读回来、点出一个模式。
#
# # 它演示什么(Phase 14)
#
# - surface.me.enabled: true —— 这条工作流上 /me 成员工作台
# - **不声明** user_scope_field —— 默认回退到 'case_id'。后端强制
#   payload.case_id = 调用者 userId,成员只能为自己跑。
# - surface.me.input_schema 只含 3 段自述,**不含 case_id** —— 成员表单
#   不暴露 scope key(对照 admin 可在 trigger.payload_schema 里设
#   case_id 替家人跑)。
#
# 需要一个 capability=reflect-on-day 的 agent 才能真正出结果;没有也能
# 派(/me dispatch 是 fire-and-forget),只是没人接。
# =============================================================================

schema: gotong.workflow/v1

workflow:
  id: daily-reflection-flow
  name: 每日反思
  description: 写下今天的高光 / 低谷 / 明天的重点,教练帮你看见一个模式

  trigger:
    capability: daily-reflection
    # admin 表单 —— 比成员表单多一个 case_id(可替家人 / 朋友各跑一份)。
    payload_schema:
      - id: case_id
        label: 为谁跑(默认你自己)
        type: text
        defaultValue: self
        hint: "字母+数字+_-. 64 字符内。成员从 /me 跑时这个字段被忽略,强制为本人。"
      - id: highlights
        label: 今天的高光
        type: textarea
        rows: 3
        required: true
        hint: "今天做成 / 感觉好的 1-3 件事"
      - id: lowlights
        label: 今天的低谷
        type: textarea
        rows: 3
        hint: "卡住 / 消耗你的 1-3 件事(可选)"
      - id: tomorrow_focus
        label: 明天最想推进的一件事
        type: text
        hint: "一句话即可(可选)"

  # 成员工作台(/me)入口。user_scope_field 省略 → 默认 case_id,后端强制
  # 为本人 userId。input_schema 只给 3 段自述,case_id 不暴露给成员。
  surface:
    me:
      enabled: true
      label: 每日反思
      description: 3 段话写完今天,教练读回来并点出一个模式
      input_schema:
        - id: highlights
          label: 今天的高光
          type: textarea
          rows: 3
          required: true
          hint: "今天做成 / 感觉好的 1-3 件事"
        - id: lowlights
          label: 今天的低谷
          type: textarea
          rows: 3
          hint: "卡住 / 消耗你的 1-3 件事(可选)"
        - id: tomorrow_focus
          label: 明天最想推进的一件事
          type: text
          hint: "一句话即可(可选)"

  steps:
    - id: reflect
      description: 反思教练读 3 段自述,点出一个值得注意的模式 + 一个最小动作
      dispatch:
        strategy: { kind: capability, capabilities: [reflect-on-day] }
        title: "每日反思"
        payload:
          # case_id 串进每一步,让处理 agent 知道这是谁的反思。
          case_id: $trigger.payload.case_id
          highlights: $trigger.payload.highlights
          lowlights: $trigger.payload.lowlights
          tomorrow_focus: $trigger.payload.tomorrow_focus

  output:
    reflection: $reflect.output
