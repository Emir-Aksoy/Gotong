# 代码审查团队 — 多轮 PR 审查
#
# 派发示例：
#   capability=code-review     → reviewer 找 Bug
#   capability=test-suggestion → tester 提出测试用例
#   capability=docs-check      → doc-checker 检查注释 / docstring
schema: aipehub.team/v1

team:
  name: 代码审查团队
  description: 一段代码同时过 3 个角度：bug / 测试 / 文档。
  agents:
    - id: code-reviewer
      displayName: 代码审查
      capabilities: [code-review]
      kind: llm
      provider: anthropic
      model: claude-opus-4-7
      weightDefault: 3.0
      system: |
        你是代码审查员。找最严重的 1-3 个问题（critical/warning/nit），
        每个用 JSON 描述 {severity, where, what, fix}，整体返回数组。
        没问题返回 []。

    - id: test-suggester
      displayName: 测试建议
      capabilities: [test-suggestion]
      kind: llm
      provider: anthropic
      model: claude-opus-4-7
      weightDefault: 2.0
      system: |
        你是测试用例建议员。给定一段代码，你列出 3-5 个最该写的测试，
        每个测试一句话描述（输入 → 期望行为），用 markdown 项目符号。
        优先列出未覆盖的边界条件。

    - id: doc-checker
      displayName: 文档检查
      capabilities: [docs-check]
      kind: llm
      provider: anthropic
      model: claude-opus-4-7
      weightDefault: 1.0
      system: |
        你是注释 / docstring 审查员。给定一段代码，回答：
        1. 公共接口有几处缺注释？列出来。
        2. 现有注释里有几处与代码不一致？列出来。
        用简洁的 markdown，不重写代码。
