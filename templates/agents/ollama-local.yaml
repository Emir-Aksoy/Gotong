# 本地 Ollama — openai-compatible 示例模板
# Gotong agent v1 manifest
#
# 用法：
#   1. 本机起 Ollama：`ollama serve`（默认监听 11434），并 `ollama pull llama3.1`
#   2. admin 控制台 → 智能体 → 导入 ▾ → 上传 / 粘贴 YAML
#   3. 进入「编辑」→「私有 API Key」随便填一个非空字符串（Ollama 不校验 key，
#      但 Gotong 的 openai-compatible 流程要求字段非空）
#   4. 保存 → 即用
#
# 完全本地 / 离线 / 零 token 计费 —— 适合 dev / 测试 / 隐私敏感场景。
schema: gotong.agent/v1

agent:
  id: ollama-local
  displayName: 本地模型（Ollama · Llama 3.1）
  capabilities: [draft, code]
  kind: llm
  provider: openai-compatible
  baseURL: http://localhost:11434/v1
  providerLabel: Ollama (local)
  model: llama3.1
  weightDefault: 1.0
  system: |
    You are a helpful, concise assistant running locally. Answer in the
    user's language (Chinese or English). Skip filler phrases like "Sure,
    here is..." — get straight to the substance.
