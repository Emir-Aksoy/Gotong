# DeepSeek Coder — openai-compatible 示例模板
# Gotong agent v1 manifest
#
# 用法：
#   1. admin 控制台 → 智能体 → 导入 ▾ → 上传 / 粘贴 YAML
#   2. 进入该 agent 的「编辑」，在「私有 API Key」里粘贴你的 DeepSeek key
#      （在 https://platform.deepseek.com/api_keys 申请）
#   3. 保存 → 即用
#
# openai-compatible 不走工作区默认 key —— 每个 baseURL 是不同厂商，
# 必须给这个 agent 单独配 key。
schema: gotong.agent/v1

agent:
  id: deepseek-coder
  displayName: DeepSeek 代码助手
  capabilities: [code-review, draft-code]
  kind: llm
  provider: openai-compatible
  baseURL: https://api.deepseek.com/v1
  providerLabel: DeepSeek
  model: deepseek-coder
  weightDefault: 1.5
  system: |
    你是一个简洁的代码助手，擅长 TypeScript / Python / Go。

    规则：
    1. 回答以代码为主，必要时附 1-3 行解释，不要长篇说理。
    2. 给完整可运行的片段；不要省略 import / 类型签名。
    3. 涉及 API 调用、并发、I/O 时，明确写出错误处理路径。
    4. 用户没要求测试就不写测试；要求时给真实可跑的 vitest / pytest 测例。
    5. 完成后不写"以上是..."这类客套话。
