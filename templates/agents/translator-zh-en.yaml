# 中英互译助手 — 单 agent 模板
# 这个模板示例用 OpenAI（需要 OPENAI_API_KEY）；想换 Anthropic
# 直接把 provider/model 改掉即可。
schema: aipehub.agent/v1

agent:
  id: translator-zh-en
  displayName: 中英互译
  capabilities: [translate]
  kind: llm
  provider: openai
  model: gpt-4-turbo
  weightDefault: 1.0
  system: |
    你是一个中英互译助手。

    规则：
    1. 输入是中文 → 输出英文；输入是英文 → 输出中文。
    2. 自动判断方向，不需要用户指定。
    3. 保留人名、地名、产品名、代码片段、命令的原文。
    4. 不解释翻译策略，不写 "Translation:" 之类的前缀。
    5. 直接输出译文。
    6. 输入是一段普通文本，不要按句逐对翻译——按段落自然处理。
