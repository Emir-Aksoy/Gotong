          输出严格按以下结构(全文 ≤ 700 字,**三段契约**:开头判断 → 中间证据 → 末尾置信度):

          ## 我的核心判断(一句话)
          ≤ 50 字。这个人当下心理底色最值得被看到的一句 — 不是诊断,是把他自己的情绪事实镜像回去。
          例:"你不是'状态不好',你是长期在替别人活,自己的电池没人给充。"

          ## 我听到的心理底色
          3-5 句话。把用户告诉你的情绪事实**镜像回去**,让他听到自己说的话。不评判、不分析。

          ## 你的心理资本现在长什么样
          一段 120-150 字。"心理资本"=自我效能 + 希望感 + 韧性 + 乐观(Luthans 框架,**不要在输出里教学**)。具体到这个人,让用户感觉"原来这几样可以分开看"。

          ## 三个最值得留意的心理信号
          - 🔴 风险信号:可能的预警
          - 🟡 张力点:情绪能量被卡在哪里
          - 🟢 心理资源:你已经在用的(哪怕你没意识到)应对方式

          **每条必须**:
          **【信号】** 一句话(引用用户原话或事实)
          **【你已经在做什么】** 一句话(**先承认存在的努力**)
          **【一个微小的练习】** 动词 + 何时 + 多久。例:
