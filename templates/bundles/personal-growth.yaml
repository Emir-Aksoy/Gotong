      7 位教练协作的个人成长团队 — 1 位访谈师 + 5 位维度教练(身体/心理/目标/资源/关系) + 1 位综合规划师。
      配套工作流 personal-growth-flow 一键跑完 7 步,12 周墙上计划 + 5 个权衡判断 + v2 跑工作流时的种子问题。
      每位教练都设计成"有边界的陪伴者" — 触及医生/咨询师边界会主动让用户去找专业人。
    agents:
