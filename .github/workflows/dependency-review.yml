# Dependency review — block PRs that introduce known-vulnerable or
# disallowed-license dependencies.
#
# What this catches:
#   - A new package with a HIGH/CRITICAL CVE → reviewers see the
#     advisory inline, can't merge under branch protection.
#   - A new package with a GPL-style copyleft license → flagged, since
#     this project is MIT and downstream consumers can't legally pull
#     copyleft dep transitively.
#   - Out-of-band lockfile bumps to a vulnerable version of an existing
#     package.
#
# Why a separate workflow:
#   The action only works on `pull_request` events (it diffs head vs.
#   base). Wedging it into ci.yml would force CI to keep failing on
#   transitive-dep advisories even when nothing in the PR's code is at
#   fault — better to surface this as its own check that reviewers can
#   triage independently.

name: Dependency review

on:
  pull_request:
    branches: [main]

permissions:
  # `pull-requests: write` lets the action post a summary comment on
  # the PR. `contents: read` is the default for diffing.
  contents: read
  pull-requests: write

jobs:
  review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Review dependencies
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          # Block HIGH and CRITICAL CVEs. MODERATE+ would be stricter
          # but tends to fail on noisy transitive deps that we can't
          # fix in this repo (e.g. a sub-dep of `@types/node` lags).
          # Start at HIGH; tighten if/when the ecosystem allows.
          fail-on-severity: high
          # Allow common permissive licenses. The list mirrors what
          # the SPDX permissive set covers in practice. Pull requests
          # introducing GPL/AGPL/SSPL/etc. get rejected here.
          allow-licenses: >-
            MIT,
            MIT-0,
            Apache-2.0,
            BSD-2-Clause,
            BSD-3-Clause,
            ISC,
            CC0-1.0,
            Unlicense,
            0BSD,
            Python-2.0,
            BlueOak-1.0.0
          # Post a summary comment so PR authors don't have to dig
          # into the Actions log to see what tripped.
          comment-summary-in-pr: on-failure
