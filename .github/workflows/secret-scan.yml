# Secret scanning — catch credentials, API keys, and private keys
# before they land in git history.
#
# Why a separate workflow:
#   GitHub's native secret scanning catches well-known token formats
#   (GitHub, AWS, Stripe, etc.) post-push. This workflow runs gitleaks
#   on a weekly schedule and on demand, with a broader rule set that
#   catches generic high-entropy strings, .env files, and the long tail
#   of provider-specific patterns gitleaks ships.
#
# Triggers (solo, pre-release, PRIVATE repo — keep per-push Actions
# minutes low):
#   - manual (`workflow_dispatch`): scan on demand
#   - weekly cron: full-history sweep + picks up new gitleaks rules
# The job's `github.event_name` switch keeps a `pull_request` diff-scan
# branch as harmless dead code, so re-adding the PR trigger later just
# works.
#
# Why install gitleaks as a binary instead of using the action:
#   `gitleaks/gitleaks-action` is convenient but requires a
#   `GITLEAKS_LICENSE` env for repositories owned by GitHub
#   Organizations (free for individual accounts, but the project may
#   move to an org one day). Installing the upstream binary directly
#   from the GitHub releases is licence-clean for any account type,
#   and the binary's CLI is stable enough that pinning to a known
#   version keeps the workflow deterministic.

name: Secret scan

on:
  workflow_dispatch:
  schedule:
    # Weekly full-history scan — picks up new gitleaks rules against
    # old commits. Tuesdays at 14:33 UTC (offset from the CI 14:05 and
    # CodeQL 14:17 crons so the three don't all wait on the same
    # shared-runner queue).
    - cron: "33 14 * * 2"

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # gitleaks needs the full history when scanning push events
          # (so it can diff against the parent commit). PRs only need
          # the merge commit + base, but fetching `0` (full) is the
          # safe default for both — runtime impact is <10s on a repo
          # this size.
          fetch-depth: 0

      - name: Install gitleaks
        # Pinned to a specific release rather than `latest` so the
        # rule set is reproducible. Bump deliberately when new
        # detectors land that are worth the noise.
        # 8.30.1: the repo-root .gitleaks.toml uses [[allowlists]] with
        # targetRules (rule-scoped test-fixture allowlist), which needs
        # gitleaks >= 8.25.
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks-dl.tar.gz
          # The tarball contains a single executable named `gitleaks`
          # — we extract to /tmp/gitleaks-bin to avoid colliding with
          # the /tmp/gitleaks-reports directory used later for SARIF
          # output.
          mkdir -p /tmp/gitleaks-bin
          tar -xzf /tmp/gitleaks-dl.tar.gz -C /tmp/gitleaks-bin gitleaks
          sudo install -m 0755 /tmp/gitleaks-bin/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan (push / schedule = full history; PR = diff vs. base)
        # `--no-banner` quiets the ASCII art. `--exit-code 1` ensures
        # a finding sinks the job (the default behaviour, but explicit
        # for the reader). Reports land in /tmp so the upload step
        # below can publish them as an artefact for triage.
        run: |
          set -euo pipefail
          mkdir -p /tmp/gitleaks-reports
          case "${{ github.event_name }}" in
            pull_request)
              # Diff scan: only the commits introduced by the PR.
              gitleaks detect \
                --source . \
                --no-banner \
                --redact \
                --report-format sarif \
                --report-path /tmp/gitleaks-reports/report.sarif \
                --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
              ;;
            *)
              # Push or schedule: full repo + history.
              gitleaks detect \
                --source . \
                --no-banner \
                --redact \
                --report-format sarif \
                --report-path /tmp/gitleaks-reports/report.sarif
              ;;
          esac

      - name: Upload SARIF report
        # Always upload — the report is most useful when a finding fired.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-report
          path: /tmp/gitleaks-reports/report.sarif
          if-no-files-found: warn
          retention-days: 30
