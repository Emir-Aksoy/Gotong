name: ✨ Feature request
description: Propose a capability that isn't there yet
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Gotong deliberately keeps the Hub small — see [`CONTRIBUTING.md`](../blob/main/CONTRIBUTING.md) ("Ground rules"). Feature requests that put LLM calls / agent loops / business rules inside the Hub will be redirected toward an external participant.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the implementation. "I want to do X because Y."
      placeholder: |
        I'm running a team room with 5 humans. Right now I have no way to …
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach (optional)
      description: A rough sketch — API shape, UI change, doc addition. We may take it as-is or redirect.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds have you tried? Why aren't they enough?
  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this touch?
      multiple: true
      options:
        - "Hub core (routing / scheduler / transcript)"
        - "Wire protocol (`docs/PROTOCOL.md`)"
        - "Admin / worker web UI"
        - "Node SDK (`@gotong/sdk-node`)"
        - "Python SDK (`gotong`)"
        - "Host binary (`@gotong/host`)"
        - "LLM providers / templates"
        - "MCP bridge (`@gotong/mcp-server`)"
        - "Documentation"
        - "Not sure"
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: I read [`CONTRIBUTING.md`](../blob/main/CONTRIBUTING.md) "Ground rules" and this proposal keeps the Hub itself dumb.
        - label: This is **not** a security issue (those go via SECURITY.md)
          required: true
