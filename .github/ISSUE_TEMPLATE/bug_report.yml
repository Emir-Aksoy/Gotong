name: рЯРЮ Bug report
description: Something doesn't work the way it should
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Before you submit:
        - Check existing issues with `is:issue bug` to avoid duplicates.
        - **Security issues do NOT go here** вАФ see [`SECURITY.md`](../blob/main/SECURITY.md).
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: One-paragraph summary. What did you do, what did you see, what did you expect?
      placeholder: |
        I ran `pnpm host`, opened the admin URL, and clicked вА¶
        Expected: вА¶
        Got: вА¶
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal sequence of commands or clicks. The more concrete, the faster the fix.
      placeholder: |
        1. `git clone вА¶ && cd Gotong && pnpm install && pnpm build`
        2. `GOTONG_SPACE=$(mktemp -d) pnpm host`
        3. Open the printed admin URL
        4. Click "+ еИЫеїЇ"
        5. вА¶
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / transcript snippet
      description: Paste host stdout, browser console, or a slice of `transcript.jsonl` if the bug is in routing / persistence.
      render: text
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse HEAD` or the `@gotong/host` package version.
      placeholder: "e.g. 1f3a2c4 or @gotong/host@2.0.0"
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment shape
      multiple: false
      options:
        - "Local (pnpm host on my laptop)"
        - "LAN (GOTONG_HOST=0.0.0.0)"
        - "Public (Caddy + systemd / VPS)"
        - "Docker (docker compose up)"
        - "Embedded library (own binary using @gotong/core)"
        - "Other / unsure"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Node / pnpm / OS
      placeholder: "node v20.20.2, pnpm 9.15.4, macOS 26.3.2 (Apple M5)"
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: This is **not** a security issue (those go via SECURITY.md)
          required: true
