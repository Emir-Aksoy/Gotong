# GitHub-native dependency update bot. We keep the cadence loose
# (weekly, not daily) and group routine bumps so the PR queue stays
# scannable.

version: 2
updates:
  # 1. npm / pnpm — the workspace root + each package picks this up
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Singapore"
    open-pull-requests-limit: 5
    groups:
      # Group routine patch / minor bumps into one PR per week.
      patch-and-minor:
        update-types: ["minor", "patch"]
      # Type packages move together with the runtimes; pull them into a
      # single PR so the changeset stays focused.
      types:
        patterns: ["@types/*"]
        update-types: ["minor", "patch"]
      # Test tooling
      test-tooling:
        patterns: ["vitest", "@vitest/*", "tsx"]
    # Surface MAJOR bumps as separate PRs — they almost always need
    # human attention.
    ignore:
      # Pin TypeScript / Node @types to whatever the engines field
      # supports. Bot has been known to push beyond Node 20.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Pin @xmldom/xmldom to the 0.8.x line. xml-crypto (our SAML signature
      # verifier, latest 6.1.2) declares "@xmldom/xmldom": "^0.8.10" and has no
      # release supporting 0.9.x. Taking the 0.9 bump would install a second
      # xmldom copy, so our DOMParser would emit 0.9 nodes that flow into
      # xml-crypto's 0.8 C14N / signature path — a cross-version DOM hazard in
      # the security-critical verify path. The 0.9 GHSA fixes are
      # XMLSerializer-only, which saml.ts does not use, so 0.8.x is not exposed.
      # (For a 0.x dep, 0.8 -> 0.9 is classed semver-minor, which is why it
      # slipped into the patch-and-minor group; block minor + major, keep
      # 0.8.x patches.) Revisit when xml-crypto ships 0.9 support.
      - dependency-name: "@xmldom/xmldom"
        update-types:
          ["version-update:semver-minor", "version-update:semver-major"]

  # 2. GitHub Actions (CI workflows in .github/workflows/, when those land)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns: ["*"]

  # 3. Python (python-sdk only — its venv is gitignored, but pyproject
  # / requirements files in the dist are tracked).
  - package-ecosystem: "pip"
    directory: "/python-sdk"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
